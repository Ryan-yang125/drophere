name: Framework compatibility
description: Propose or improve support for a static-site build workflow.
title: "compat: "
labels: [compatibility]
body:
  - type: input
    id: framework
    attributes:
      label: Framework and version
      placeholder: Astro 6.0
    validations:
      required: true
  - type: input
    id: build
    attributes:
      label: Build command
      placeholder: pnpm build
    validations:
      required: true
  - type: input
    id: output
    attributes:
      label: Generated output directory
      placeholder: dist
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Current behavior and proposed check
    validations:
      required: true
